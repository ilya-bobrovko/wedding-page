<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Приглашение на свадьбу Арины и Ильи — 3 августа 2026" />
    <title>Арина и Илья — 3 августа 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;1,8..60,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="hero section" id="hero">
        <div class="hero__content">
          <p class="hero__eyebrow reveal">Свадьба</p>
          <h1 class="hero__names reveal" id="couple-names"></h1>
          <p class="hero__tagline reveal" id="hero-tagline"></p>
          <p class="hero__date reveal" id="hero-date"></p>
        </div>
      </header>

      <section class="countdown section" id="countdown" aria-label="Обратный отсчёт">
        <p class="countdown__label reveal" id="countdown-label"></p>
        <div class="countdown__grid reveal" id="countdown-grid" role="timer" aria-live="polite">
          <div class="countdown__item">
            <span class="countdown__value" id="cd-days">—</span>
            <span class="countdown__unit">дней</span>
          </div>
          <div class="countdown__item">
            <span class="countdown__value" id="cd-hours">—</span>
            <span class="countdown__unit">часов</span>
          </div>
          <div class="countdown__item">
            <span class="countdown__value" id="cd-minutes">—</span>
            <span class="countdown__unit">минут</span>
          </div>
          <div class="countdown__item">
            <span class="countdown__value" id="cd-seconds">—</span>
            <span class="countdown__unit">секунд</span>
          </div>
        </div>
        <p class="countdown__done reveal" id="countdown-done" hidden>Мы уже празднуем — скоро увидимся!</p>
      </section>

      <section class="venue section" id="venue" aria-labelledby="venue-title">
        <h2 class="section__title reveal" id="venue-title">Место</h2>
        <article class="venue__card reveal">
          <div class="venue__image-wrap" id="venue-image-wrap">
            <img class="venue__image" id="venue-image" alt="" width="640" height="400" hidden />
            <div class="venue__placeholder" id="venue-placeholder" aria-hidden="true"></div>
          </div>
          <div class="venue__body">
            <h3 class="venue__name" id="venue-name"></h3>
            <p class="venue__address" id="venue-address"></p>
            <p class="venue__note" id="venue-note"></p>
            <a class="btn" id="venue-maps" href="#" target="_blank" rel="noopener noreferrer"></a>
          </div>
        </article>
      </section>

      <section class="schedule section" id="schedule" aria-labelledby="schedule-title">
        <h2 class="section__title reveal" id="schedule-title"></h2>
        <ol class="schedule__list" id="schedule-list"></ol>
      </section>

      <section class="wishes section" id="wishes" aria-labelledby="wishes-title">
        <h2 class="section__title reveal" id="wishes-title"></h2>
        <div class="wishes__list" id="wishes-list"></div>
      </section>

      <section class="organizer section" id="organizer" aria-labelledby="organizer-title">
        <h2 class="section__title reveal" id="organizer-title"></h2>
        <div class="organizer__card reveal">
          <p class="organizer__name" id="organizer-name"></p>
          <a class="organizer__link" id="organizer-phone" href="#"></a>
          <a class="organizer__link organizer__link--telegram" id="organizer-telegram" href="#" target="_blank" rel="noopener noreferrer"></a>
        </div>
      </section>

      <footer class="footer section">
        <p class="footer__text reveal" id="footer-text"></p>
      </footer>
    </main>

    <script src="script.js" defer></script>
  </body>
</html>
